services:
  mysql:
    image: mysql:8.0
    container_name: soutenance_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: soutenance

    ports:
      - "3310:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: soutenance_backend

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "4000:4000"

    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
      MYSQL_DATABASE: soutenance
      PORT: 4000

    restart: unless-stopped

volumes:
  mysql-data: